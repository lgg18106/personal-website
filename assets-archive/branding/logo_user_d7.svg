    <mask id="cutD7">
      <rect x="0" y="0" width="240" height="240" fill="white"/>
      <!-- Vela 1 -->
      <line x1="60" y1="65" x2="60" y2="170" stroke="black" stroke-width="3"/>
      <rect x="52" y="100" width="16" height="50" fill="black" rx="1"/>
      <!-- Vela 2 -->
      <line x1="100" y1="80" x2="100" y2="190" stroke="black" stroke-width="3"/>
      <rect x="92" y="115" width="16" height="60" fill="black" rx="1"/>
      <!-- Vela 3 -->
      <line x1="140" y1="55" x2="140" y2="160" stroke="black" stroke-width="3"/>
      <rect x="132" y="75" width="16" height="65" fill="black" rx="1"/>
      <!-- Vela 4 -->
      <line x1="180" y1="45" x2="180" y2="150" stroke="black" stroke-width="3"/>
