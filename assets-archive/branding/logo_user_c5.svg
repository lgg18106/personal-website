<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <!-- VARIANTE C5 · Barras + curva pasando por los topes (overlay)
       La curva ondulada pasa exactamente por los TOPES de las barras
       como una "trend line" sobre histograma. Conectados visualmente. -->
  <defs>
    <mask id="cutC5">
      <rect x="0" y="0" width="240" height="240" fill="white"/>

      <!-- 5 barras de alturas variables (histograma con onda) -->
      <rect x="48" y="155" width="22" height="35" fill="black" rx="2"/>
      <rect x="80" y="125" width="22" height="65" fill="black" rx="2"/>
      <rect x="112" y="145" width="22" height="45" fill="black" rx="2"/>
      <rect x="144" y="100" width="22" height="90" fill="black" rx="2"/>
      <rect x="176" y="75" width="22" height="115" fill="black" rx="2"/>

      <!-- Curva pasando por los topes de las barras (trend line) -->
      <path d="M 59 155 C 70 140, 80 125, 91 125 C 105 130, 110 145, 123 145 C 135 130, 145 100, 155 100 C 170 95, 180 80, 187 75"
            fill="none" stroke="black" stroke-width="11"
            stroke-linecap="round" stroke-linejoin="round"/>
    </mask>
  </defs>
  <rect x="14" y="14" width="212" height="212" rx="32"
        fill="#D9A12C" mask="url(#cutC5)"/>
</svg>
