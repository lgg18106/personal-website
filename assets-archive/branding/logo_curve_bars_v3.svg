<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- VARIANTE 3 · Barras a la izquierda + curva a la derecha
       3 barras outline crecientes ocupan 1/3 del frame · la curva sale de
       la última barra y asciende ondulando hacia el peak final.
       Narrativa: "pasado discreto · futuro continuo". -->

  <!-- Frame cuadrado puro -->
  <rect x="22" y="22" width="156" height="156"
        stroke="#E6AA04" stroke-width="2.5" fill="none" />

  <!-- 3 barras outline a la izquierda · creciendo -->
  <rect x="38" y="135" width="16" height="27"
        stroke="#E6AA04" stroke-width="2.5" fill="none" />
  <rect x="60" y="115" width="16" height="47"
        stroke="#E6AA04" stroke-width="2.5" fill="none" />
  <rect x="82" y="95" width="16" height="67"
        stroke="#E6AA04" stroke-width="2.5" fill="none" />

  <!-- Curva ondulada que sale del top de la última barra -->
  <path d="M 98 95 C 112 95, 118 122, 128 125 C 142 128, 150 75, 162 55"
        stroke="#E6AA04" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Punto en el peak final -->
  <circle cx="162" cy="55" r="8.5" fill="#E6AA04" />
</svg>
