project:
  type: website
  output-dir: _site
  resources:
    - "CNAME"
    - "images/**"

website:
  title: "Gonzalo Llamosas"
  description: "Assistant Professor in Public Finance · University of Málaga"
  site-url: "https://gonzalollamosas.com"
  image: images/profile.jpg
  favicon: images/branding/logo_curve_bars_v4.svg

  open-graph:
    image: "https://gonzalollamosas.com/images/og-image.png"
    image-alt: "Gonzalo Llamosas — Assistant Professor in Public Finance, University of Málaga"
    locale: en_US
  twitter-card:
    image: "https://gonzalollamosas.com/images/og-image.png"
    card-style: summary_large_image

  navbar:
    pinned: true
    logo: images/branding/navbar_combo_v4.png
    logo-href: /
    logo-alt: "Gonzalo Llamosas"
    title: false
    left:
      - text: "About"
        href: about.qmd
      - text: "Research"
        href: research.qmd
      - text: "Teaching"
        href: teaching.qmd
      - text: "Outlook Project"
        href: outlook-project.qmd
      - text: "Blog"
        href: blog/index.qmd
      - text: "CV"
        href: cv/index.qmd
    right:
      - icon: linkedin
        href: https://www.linkedin.com/in/gonzalo-llamosas-garcia/
        aria-label: LinkedIn
      - icon: twitter-x
        href: https://x.com/gonzalollamosas
        aria-label: X
      - icon: envelope
        href: "mailto:gonzalo.llamosas@uma.es"
        aria-label: Email
      - text: "Scholar"
        href: https://scholar.google.com/citations?user=O8gTD4AAAAAJ&hl=en
      - text: "ORCID"
        href: https://orcid.org/0000-0002-4407-2845

  search:
    location: navbar
    type: overlay

  page-footer:
    border: true
    left: |
      © 2026 Gonzalo Llamosas
    center: ""
    right:
      Built with [Quarto](https://quarto.org)

format:
  html:
    fontsize: 1.1em
    theme:
      - pulse
      - html/styles.scss
    toc: false
    code-link: true
    anchor-sections: true
    fig-cap-location: margin
    reference-location: margin
    footnotes-hover: true
    include-in-header:
      - text: |
          <link rel="apple-touch-icon" sizes="180x180" href="/images/branding/favicon-180.png">
          <link rel="icon" type="image/png" sizes="32x32" href="/images/branding/favicon-64.png">

execute:
  freeze: auto
