project:
  type: website
  output-dir: _site
  resources:
    - "CNAME"
    - "images/**"

website:
  title: "Gonzalo Llamosas"
  description: "Assistant Professor in Public Finance · University of Málaga"
  site-url: "https://gonzalollamosas.com"
  repo-url: "https://github.com/lgg18106/personal-website"
  favicon: images/branding/03_favicon.svg

  open-graph:
    image: "https://gonzalollamosas.com/images/og-image.png"
    image-alt: "Gonzalo Llamosas — Assistant Professor in Public Finance, University of Málaga"
    locale: en_US
  twitter-card:
    image: "https://gonzalollamosas.com/images/og-image.png"
    card-style: summary_large_image

  navbar:
    pinned: true
    logo: images/branding/wordmark.png
    logo-href: /
    logo-alt: "Gonzalo Llamosas"
    title: false
    left:
      - text: "About"
        href: about.qmd
      - text: "Research"
        href: research.qmd
      - text: "Teaching"
        href: teaching.qmd
      - text: "Outlook Project"
        href: outlook-project.qmd
      - text: "Blog"
        href: blog/index.qmd
      - text: "CV"
        href: cv/index.qmd
      - text: "Contact"
        href: contact.qmd
    right:
      - icon: github
        href: https://github.com/lgg18106
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/gonzalo-llamosas-garcia/
        aria-label: LinkedIn
      - icon: twitter-x
        href: https://x.com/gonzalollamosas
        aria-label: X
      - text: "Scholar"
        href: https://scholar.google.com/citations?user=O8gTD4AAAAAJ&hl=en
      - text: "ORCID"
        href: https://orcid.org/0000-0002-4407-2845

  page-footer:
    border: true
    left: |
      © 2026 Gonzalo Llamosas
    center: |
      Built with [Quarto](https://quarto.org) · Source on [GitHub](https://github.com/lgg18106/personal-website)
    right:
      - icon: envelope
        href: "mailto:gonzalo.llamosas@uma.es"
        aria-label: Email

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: false
    smooth-scroll: true
    code-link: true
    anchor-sections: true
    grid:
      sidebar-width: 250px
      body-width: 800px
      margin-width: 250px
    include-in-header:
      - text: |
          <link rel="apple-touch-icon" sizes="180x180" href="/images/branding/favicon-180.png">
          <link rel="icon" type="image/png" sizes="32x32" href="/images/branding/favicon-64.png">
          <meta name="theme-color" content="#000000">
