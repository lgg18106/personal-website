project:
  type: website
  output-dir: _site
  resources:
    - "CNAME"
    - "robots.txt"
    - "images/**"
  post-render:
    - python3 _scripts/post-render.py

website:
  title: "Gonzalo Llamosas"
  description: "Personal website of Gonzalo Llamosas-García, Assistant Professor in Public Finance at the University of Málaga. Research on fiscal policy, public debt sustainability and behavioural economics."
  site-url: "https://gonzalollamosas.com"
  image: images/profile.jpg
  favicon: images/branding/logo_user_e1.svg

  open-graph:
    image: "https://gonzalollamosas.com/images/og-image.png"
    image-alt: "Gonzalo Llamosas — Assistant Professor in Public Finance, University of Málaga"
    locale: en_GB
  twitter-card:
    image: "https://gonzalollamosas.com/images/og-image.png"
    card-style: summary_large_image

  navbar:
    pinned: true
    logo: images/branding/navbar_combo_e1.png
    logo-href: /
    logo-alt: "Gonzalo Llamosas"
    title: false
    left:
      - text: "About"
        href: about.qmd
      - text: "Research"
        href: research.qmd
      - text: "Teaching"
        href: teaching.qmd
      - text: "Outlook Project"
        href: outlook-project.qmd
      - text: "Blog"
        href: blog/index.qmd
      - text: "CV"
        href: cv/index.qmd
      - text: "Contact"
        href: contact.qmd
    right:
      - icon: linkedin
        href: https://www.linkedin.com/in/gonzalo-llamosas-garcia/
        aria-label: LinkedIn
      - icon: twitter-x
        href: https://x.com/gonzalollamosas
        aria-label: X
      - icon: envelope
        href: "mailto:gonzalo.llamosas@uma.es"
        aria-label: Email
      - text: "Scholar"
        href: https://scholar.google.com/citations?user=O8gTD4AAAAAJ&hl=en
      - text: "ORCID"
        href: https://orcid.org/0000-0002-4407-2845

  search:
    location: navbar
    type: overlay

  page-footer:
    border: true
    left: |
      © 2026 Gonzalo Llamosas
    center: |
      <a href="https://www.uma.es" target="_blank" class="uma-footer-link">
        <img src="/images/uma_logo.png" alt="Universidad de Málaga" class="uma-footer-logo">
      </a>
    right:
      Built with [Quarto](https://quarto.org)

lang: en

format:
  html:
    fontsize: 1.1em
    theme:
      - pulse
      - html/styles.scss
    toc: false
    code-link: true
    anchor-sections: true
    fig-cap-location: margin
    reference-location: margin
    footnotes-hover: true
    include-in-header:
      - text: |
          <link rel="apple-touch-icon" sizes="180x180" href="/images/branding/logo_e1_180.png">
          <link rel="icon" type="image/png" sizes="32x32" href="/images/branding/logo_e1_32.png">
          <link rel="icon" type="image/png" sizes="64x64" href="/images/branding/logo_e1_64.png">
          <link rel="icon" type="image/png" sizes="512x512" href="/images/branding/logo_e1_512.png">
