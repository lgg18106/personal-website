<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1440" fill="none">
  <!-- Fondo blanco completo -->
  <rect width="2560" height="1440" fill="#FFFFFF"/>
  
  <!-- 
    Zona segura central: 1546x423 centrada
    Coordenadas: x = (2560-1546)/2 = 507, y = (1440-423)/2 = 508
    Es decir, contenido entre x=507-2053 y y=508-931
  -->
  
  <!-- Elementos decorativos sutiles que ocupan zona externa -->
  <!-- Líneas verticales finas tipo papel cuadriculado a los lados -->
  <g opacity="0.06">
    <line x1="200" y1="0" x2="200" y2="1440" stroke="#000000" stroke-width="1"/>
    <line x1="2360" y1="0" x2="2360" y2="1440" stroke="#000000" stroke-width="1"/>
  </g>
  
  <!-- Marco con líneas que enmarca el contenido principal -->
  <line x1="650" y1="430" x2="1910" y2="430" stroke="#000000" stroke-width="1"/>
  <line x1="650" y1="1010" x2="1910" y2="1010" stroke="#000000" stroke-width="1"/>
  
  <!-- Microtexto editorial superior -->
  <text x="650" y="410" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#000000" letter-spacing="6">VOL. 01 · MMXXVI</text>
  <text x="1910" y="410" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#000000" letter-spacing="6" text-anchor="end">MÁLAGA · MADRID</text>
  
  <!-- O grande, alineada al baseline -->
  <g transform="translate(720, 690)">
    <circle cx="0" cy="0" r="105" fill="#000000"/>
    <circle cx="0" cy="0" r="50" fill="#FFFFFF"/>
  </g>
  
  <!-- "utlook" baseline en y=795 -->
  <text x="838" y="795" font-family="'Helvetica Neue', Arial, sans-serif" font-size="225" font-weight="800" fill="#000000" letter-spacing="-12">utlook</text>
  
  <!-- "Project" -->
  <text x="650" y="955" font-family="'Helvetica Neue', Arial, sans-serif" font-size="150" font-weight="200" fill="#000000" letter-spacing="-4">Project</text>
  
  <!-- Tagline pie -->
  <text x="650" y="1050" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="#666666" letter-spacing="5">ECONOMICS · DATA · HUMAN DECISIONS</text>
  <text x="1910" y="1050" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="#666666" letter-spacing="5" text-anchor="end">— GONZALO LLAMOSAS</text>
</svg>
