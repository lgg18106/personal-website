<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <!-- E5 · Histograma campana + curva density + eje X
       Mini chart académico completo · simétrico perfecto.
       Estilo "figura de paper estadística". -->
  <defs>
    <mask id="cutE5">
      <rect x="0" y="0" width="240" height="240" fill="white"/>
      <!-- Eje X horizontal -->
      <line x1="40" y1="195" x2="200" y2="195"
            stroke="black" stroke-width="6" stroke-linecap="round"/>
      <!-- 5 barras campana simétricas -->
      <rect x="51" y="165" width="22" height="25" fill="black" rx="2"/>
      <rect x="80" y="140" width="22" height="50" fill="black" rx="2"/>
      <rect x="109" y="115" width="22" height="75" fill="black" rx="2"/>
      <rect x="138" y="140" width="22" height="50" fill="black" rx="2"/>
      <rect x="167" y="165" width="22" height="25" fill="black" rx="2"/>
      <!-- Curva density · peak central -->
      <path d="M 45 145 Q 75 75, 120 70 Q 165 75, 195 145"
            stroke="black" stroke-width="10" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
    </mask>
  </defs>
  <rect x="14" y="14" width="212" height="212" rx="32" fill="#D9A12C" mask="url(#cutE5)"/>
</svg>
