<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <!-- E1 · Histograma campana + density curve por encima
       Simétrico perfecto: 5 barras espejadas + curva en campana.
       Eje de simetría: x=120. -->
  <defs>
    <mask id="cutE1">
      <rect x="0" y="0" width="240" height="240" fill="white"/>
      <!-- 5 barras simétricas (campana) -->
      <rect x="51" y="165" width="22" height="25" fill="black" rx="2"/>
      <rect x="80" y="140" width="22" height="50" fill="black" rx="2"/>
      <rect x="109" y="115" width="22" height="75" fill="black" rx="2"/>
      <rect x="138" y="140" width="22" height="50" fill="black" rx="2"/>
      <rect x="167" y="165" width="22" height="25" fill="black" rx="2"/>
      <!-- Curva density por encima · campana suave -->
      <path d="M 45 150 Q 80 80, 120 75 Q 160 80, 195 150"
            stroke="black" stroke-width="11" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
    </mask>
  </defs>
  <rect x="14" y="14" width="212" height="212" rx="32" fill="#D9A12C" mask="url(#cutE1)"/>
</svg>
