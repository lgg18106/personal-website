<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <!-- E1 · Histograma campana + density curve por encima
       VERSIÓN CENTRADA · contenido subido 13px para centrar vertical y horizontal.
       Eje de simetría horizontal: x=120 · Eje vertical: y=120 (centro del cuadro). -->
  <defs>
    <mask id="cutE1">
      <rect x="0" y="0" width="240" height="240" fill="white"/>
      <!-- 5 barras simétricas (campana) · centradas verticalmente -->
      <rect x="51" y="152" width="22" height="25" fill="black" rx="2"/>
      <rect x="80" y="127" width="22" height="50" fill="black" rx="2"/>
      <rect x="109" y="102" width="22" height="75" fill="black" rx="2"/>
      <rect x="138" y="127" width="22" height="50" fill="black" rx="2"/>
      <rect x="167" y="152" width="22" height="25" fill="black" rx="2"/>
      <!-- Curva density por encima · campana suave centrada -->
      <path d="M 45 137 Q 80 67, 120 62 Q 160 67, 195 137"
            stroke="black" stroke-width="11" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
    </mask>
  </defs>
  <rect x="14" y="14" width="212" height="212" rx="32" fill="#D9A12C" mask="url(#cutE1)"/>
</svg>
