<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <!-- E1 · Histograma campana + density curve · CENTRADO PERCEPTUAL
       Contenido subido para compensar el peso visual de las barras.
       Curva más gruesa (14px) para equilibrar masa visual con las barras. -->
  <defs>
    <mask id="cutE1">
      <rect x="0" y="0" width="240" height="240" fill="white"/>
      <!-- 5 barras campana subidas (bases en y=158) -->
      <rect x="51" y="133" width="22" height="25" fill="black" rx="2"/>
      <rect x="80" y="108" width="22" height="50" fill="black" rx="2"/>
      <rect x="109" y="83" width="22" height="75" fill="black" rx="2"/>
      <rect x="138" y="108" width="22" height="50" fill="black" rx="2"/>
      <rect x="167" y="133" width="22" height="25" fill="black" rx="2"/>
      <!-- Curva density · más gruesa para equilibrar el peso visual -->
      <path d="M 45 118 Q 80 48, 120 43 Q 160 48, 195 118"
            stroke="black" stroke-width="14" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
    </mask>
  </defs>
  <rect x="14" y="14" width="212" height="212" rx="32" fill="#D9A12C" mask="url(#cutE1)"/>
</svg>
