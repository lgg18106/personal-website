<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- VARIANTE 2 · Mini plot académico
       Ejes X + Y completos, grid sutil, curva, punto destacado.
       Es un thumbnail de figura científica, estilo paper. -->

  <!-- Grid sutil · líneas horizontales muy claras -->
  <line x1="35" y1="90" x2="175" y2="90" stroke="#E6AA04" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="3,3" />
  <line x1="35" y1="125" x2="175" y2="125" stroke="#E6AA04" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="3,3" />

  <!-- Eje Y -->
  <line x1="35" y1="35" x2="35" y2="160" stroke="#000000" stroke-width="2.5" stroke-linecap="round" />
  <!-- Eje X -->
  <line x1="35" y1="160" x2="180" y2="160" stroke="#000000" stroke-width="2.5" stroke-linecap="round" />

  <!-- Tick marks eje X -->
  <line x1="70" y1="160" x2="70" y2="165" stroke="#000000" stroke-width="2" />
  <line x1="105" y1="160" x2="105" y2="165" stroke="#000000" stroke-width="2" />
  <line x1="140" y1="160" x2="140" y2="165" stroke="#000000" stroke-width="2" />
  <line x1="175" y1="160" x2="175" y2="165" stroke="#000000" stroke-width="2" />

  <!-- Tick marks eje Y -->
  <line x1="30" y1="125" x2="35" y2="125" stroke="#000000" stroke-width="2" />
  <line x1="30" y1="90" x2="35" y2="90" stroke="#000000" stroke-width="2" />
  <line x1="30" y1="55" x2="35" y2="55" stroke="#000000" stroke-width="2" />

  <!-- Curva · IRF típica -->
  <path d="M 38 145 Q 70 95, 105 70 Q 140 80, 175 105"
        stroke="#E6AA04" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Punto en el peak -->
  <circle cx="105" cy="70" r="8" fill="#E6AA04" />
</svg>
