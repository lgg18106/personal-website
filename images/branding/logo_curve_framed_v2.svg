<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- VARIANTE 2 · Frame cuadrado puro (esquinas rectas) · más severo
       Sin línea base, sin drop-line · solo frame + curva + punto.
       Máximo minimalismo · estilo Bauhaus / Stratechery. -->

  <!-- Frame cuadrado puro -->
  <rect x="22" y="22" width="156" height="156"
        stroke="#E6AA04" stroke-width="2.5" fill="none" />

  <!-- Curva ondulada ascendente -->
  <path d="M 38 150 C 52 130, 65 95, 82 95 C 100 95, 108 122, 118 125 C 132 128, 145 75, 162 55"
        stroke="#E6AA04" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Punto en el peak final -->
  <circle cx="162" cy="55" r="8.5" fill="#E6AA04" />
</svg>
