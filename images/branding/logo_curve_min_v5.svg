<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- VARIANTE 5 · Curva con dos puntos · origen + peak
       Punto pequeño al inicio (el shock, t=0) y punto grande en el peak.
       Cuenta la narrativa: "esto pasó aquí, y este es el efecto". -->
  <line x1="22" y1="160" x2="178" y2="160"
        stroke="#E6AA04" stroke-width="2" stroke-linecap="round" />
  <path d="M 30 145 Q 70 60, 110 50 Q 150 60, 175 95"
        stroke="#E6AA04" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <circle cx="30" cy="145" r="5" fill="#E6AA04" />
  <circle cx="110" cy="50" r="9" fill="#E6AA04" />
</svg>
