<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- VARIANTE 3 · Sparkline financial
       Sin ejes, línea limpia. Estilo Bloomberg terminal / FT.
       Simulación de serie temporal con micro-volatilidad y punto al final. -->

  <!-- Línea base sutil de referencia -->
  <line x1="20" y1="135" x2="180" y2="135"
        stroke="#000000" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="2,4" />

  <!-- Curva con micro-oscilación realista -->
  <path d="M 20 140 L 35 128 L 50 132 L 65 115 L 80 95 L 95 88 L 110 70
           L 125 78 L 140 62 L 155 55 L 170 50"
        stroke="#E6AA04" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Punto al final · "última observación" -->
  <circle cx="170" cy="50" r="11" fill="#E6AA04" />
  <circle cx="170" cy="50" r="5" fill="#FFFFFF" />
</svg>
