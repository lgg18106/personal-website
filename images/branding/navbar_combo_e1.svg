<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 110" fill="none">
  <!-- Combo navbar · logo E1 centrado perceptual + "Gonzalo Llamosas" -->

  <svg x="15" y="15" width="80" height="80" viewBox="0 0 240 240">
    <defs>
      <mask id="cutNav">
        <rect x="0" y="0" width="240" height="240" fill="white"/>
        <rect x="51" y="133" width="22" height="25" fill="black" rx="2"/>
        <rect x="80" y="108" width="22" height="50" fill="black" rx="2"/>
        <rect x="109" y="83" width="22" height="75" fill="black" rx="2"/>
        <rect x="138" y="108" width="22" height="50" fill="black" rx="2"/>
        <rect x="167" y="133" width="22" height="25" fill="black" rx="2"/>
        <path d="M 45 118 Q 80 48, 120 43 Q 160 48, 195 118"
              stroke="black" stroke-width="14" fill="none"
              stroke-linecap="round" stroke-linejoin="round"/>
      </mask>
    </defs>
    <rect x="14" y="14" width="212" height="212" rx="32"
          fill="#D9A12C" mask="url(#cutNav)"/>
  </svg>

  <text x="115" y="73"
        font-family="Lato, 'Helvetica Neue', Arial, sans-serif"
        font-size="48"
        font-weight="500"
        fill="#FFFFFF"
        letter-spacing="-0.8">Gonzalo Llamosas</text>
</svg>
