<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- VARIANTE 2 · Mini bar-chart al pie + curva ondulada
       Barras pequeñas outline en la mitad inferior + curva flotando arriba.
       Composición clásica de "histogram + density curve". -->

  <!-- Frame cuadrado puro -->
  <rect x="22" y="22" width="156" height="156"
        stroke="#E6AA04" stroke-width="2.5" fill="none" />

  <!-- 4 barras outline al pie · creciente -->
  <rect x="42" y="140" width="16" height="22"
        stroke="#E6AA04" stroke-width="2.5" fill="none" />
  <rect x="68" y="125" width="16" height="37"
        stroke="#E6AA04" stroke-width="2.5" fill="none" />
  <rect x="94" y="110" width="16" height="52"
        stroke="#E6AA04" stroke-width="2.5" fill="none" />
  <rect x="120" y="95" width="16" height="67"
        stroke="#E6AA04" stroke-width="2.5" fill="none" />

  <!-- Curva ondulada arriba · sube-baja-sube -->
  <path d="M 38 80 C 55 65, 68 50, 85 52 C 100 55, 108 78, 118 80 C 132 82, 142 55, 158 42"
        stroke="#E6AA04" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Punto en el peak final de la curva -->
  <circle cx="158" cy="42" r="7.5" fill="#E6AA04" />
</svg>
