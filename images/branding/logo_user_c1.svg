<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <!-- VARIANTE C1 · Histograma + density curve overlay
       5 barras al fondo + curva ondulada por encima · SIN punto final.
       Las barras "anclan" visualmente la curva → cero efecto esperma. -->
  <defs>
    <mask id="cutC1">
      <rect x="0" y="0" width="240" height="240" fill="white"/>

      <!-- 5 barras de alturas distintas (histograma con peak central) -->
      <rect x="48" y="160" width="20" height="30" fill="black" rx="2"/>
      <rect x="78" y="140" width="20" height="50" fill="black" rx="2"/>
      <rect x="108" y="120" width="20" height="70" fill="black" rx="2"/>
      <rect x="138" y="135" width="20" height="55" fill="black" rx="2"/>
      <rect x="168" y="105" width="20" height="85" fill="black" rx="2"/>

      <!-- Curva ondulada por encima de las barras · sin punto -->
      <path d="M 45 100 C 75 75, 100 115, 125 100 C 145 88, 160 100, 195 60"
            fill="none" stroke="black" stroke-width="14"
            stroke-linecap="round" stroke-linejoin="round"/>
    </mask>
  </defs>
  <rect x="14" y="14" width="212" height="212" rx="32"
        fill="#D9A12C" mask="url(#cutC1)"/>
</svg>
