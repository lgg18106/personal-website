<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- VARIANTE 4 · Barras finas verticales · estilo "candlestick / volume bars"
       Barras finas dorado-translúcido en posiciones uniformes detrás
       de la curva · evoca volumen bursátil + price line. -->

  <!-- Frame cuadrado puro -->
  <rect x="22" y="22" width="156" height="156"
        stroke="#E6AA04" stroke-width="2.5" fill="none" />

  <!-- Barras finas verticales · datos discretos al fondo -->
  <line x1="40" y1="160" x2="40" y2="148" stroke="#E6AA04" stroke-width="3.5" stroke-opacity="0.35" stroke-linecap="round" />
  <line x1="58" y1="160" x2="58" y2="135" stroke="#E6AA04" stroke-width="3.5" stroke-opacity="0.35" stroke-linecap="round" />
  <line x1="76" y1="160" x2="76" y2="105" stroke="#E6AA04" stroke-width="3.5" stroke-opacity="0.35" stroke-linecap="round" />
  <line x1="94" y1="160" x2="94" y2="100" stroke="#E6AA04" stroke-width="3.5" stroke-opacity="0.35" stroke-linecap="round" />
  <line x1="112" y1="160" x2="112" y2="120" stroke="#E6AA04" stroke-width="3.5" stroke-opacity="0.35" stroke-linecap="round" />
  <line x1="130" y1="160" x2="130" y2="115" stroke="#E6AA04" stroke-width="3.5" stroke-opacity="0.35" stroke-linecap="round" />
  <line x1="148" y1="160" x2="148" y2="80" stroke="#E6AA04" stroke-width="3.5" stroke-opacity="0.35" stroke-linecap="round" />
  <line x1="162" y1="160" x2="162" y2="63" stroke="#E6AA04" stroke-width="3.5" stroke-opacity="0.35" stroke-linecap="round" />

  <!-- Curva ondulada principal -->
  <path d="M 38 150 C 52 130, 65 95, 82 95 C 100 95, 108 122, 118 125 C 132 128, 145 75, 162 55"
        stroke="#E6AA04" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Punto en el peak final -->
  <circle cx="162" cy="55" r="8.5" fill="#E6AA04" />
</svg>
