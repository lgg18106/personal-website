<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- VARIANTE 1 · Frame cuadrado redondeado · curva ondulada ascendente
       Patrón: sube → baja → sube (final más alto)
       Drop-line al peak final + punto · todo dorado puro -->

  <!-- Frame cuadrado redondeado -->
  <rect x="22" y="22" width="156" height="156" rx="6"
        stroke="#E6AA04" stroke-width="2.5" fill="none" />

  <!-- Línea base interior sutil -->
  <line x1="35" y1="160" x2="165" y2="160"
        stroke="#E6AA04" stroke-width="1.5" stroke-opacity="0.35"
        stroke-linecap="round" />

  <!-- Drop-line vertical al peak final · punteada -->
  <line x1="158" y1="55" x2="158" y2="160"
        stroke="#E6AA04" stroke-width="1.5" stroke-opacity="0.4"
        stroke-dasharray="3,3" />

  <!-- Curva ondulada ascendente: sube · baja · sube más alto -->
  <path d="M 35 150 C 48 132, 62 95, 82 95 C 100 95, 108 122, 118 125 C 132 128, 145 75, 158 55"
        stroke="#E6AA04" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Punto en el peak final -->
  <circle cx="158" cy="55" r="8" fill="#E6AA04" />
</svg>
