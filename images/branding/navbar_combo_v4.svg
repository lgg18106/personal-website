<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 110" fill="none">
  <!-- Combo navbar · logo curve+bars v4 + "Gonzalo Llamosas" en blanco
       Lato 500 más grande para legibilidad. Pensado para navbar negro. -->

  <!-- Logo cuadrado · escala 0.42 del v4 original (200×200 → 84×84) -->
  <g transform="translate(13, 13)">
    <!-- Frame -->
    <rect x="9" y="9" width="66" height="66"
          stroke="#E6AA04" stroke-width="1.6" fill="none" />

    <!-- Barras finas verticales translúcidas -->
    <line x1="16.8" y1="68" x2="16.8" y2="62.5" stroke="#E6AA04" stroke-width="1.6" stroke-opacity="0.35" stroke-linecap="round" />
    <line x1="24.4" y1="68" x2="24.4" y2="56.7" stroke="#E6AA04" stroke-width="1.6" stroke-opacity="0.35" stroke-linecap="round" />
    <line x1="32" y1="68" x2="32" y2="44.1" stroke="#E6AA04" stroke-width="1.6" stroke-opacity="0.35" stroke-linecap="round" />
    <line x1="39.6" y1="68" x2="39.6" y2="42" stroke="#E6AA04" stroke-width="1.6" stroke-opacity="0.35" stroke-linecap="round" />
    <line x1="47.2" y1="68" x2="47.2" y2="50.4" stroke="#E6AA04" stroke-width="1.6" stroke-opacity="0.35" stroke-linecap="round" />
    <line x1="54.8" y1="68" x2="54.8" y2="48.3" stroke="#E6AA04" stroke-width="1.6" stroke-opacity="0.35" stroke-linecap="round" />
    <line x1="62.4" y1="68" x2="62.4" y2="33.6" stroke="#E6AA04" stroke-width="1.6" stroke-opacity="0.35" stroke-linecap="round" />
    <line x1="68" y1="68" x2="68" y2="26.5" stroke="#E6AA04" stroke-width="1.6" stroke-opacity="0.35" stroke-linecap="round" />

    <!-- Curva ondulada -->
    <path d="M 16 63 C 22 54.6, 27.3 39.9, 34.4 39.9 C 42 39.9, 45.4 51.2, 49.6 52.5 C 55.4 53.8, 60.9 31.5, 68 23.1"
          stroke="#E6AA04" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" fill="none" />

    <!-- Punto en el peak -->
    <circle cx="68" cy="23.1" r="3.6" fill="#E6AA04" />
  </g>

  <!-- Wordmark "Gonzalo Llamosas" en blanco, Lato 500, MÁS grande -->
  <text x="115" y="73"
        font-family="Lato, 'Helvetica Neue', Arial, sans-serif"
        font-size="48"
        font-weight="500"
        fill="#FFFFFF"
        letter-spacing="-0.8">Gonzalo Llamosas</text>
</svg>
