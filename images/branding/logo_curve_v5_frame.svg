<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- VARIANTE 5 · Curva enmarcada · "chart card" editorial
       Marco rectangular dorado fino con la curva contenida dentro.
       Estilo "small multiples" de revista económica seria. -->

  <!-- Frame rectangular dorado -->
  <rect x="22" y="35" width="156" height="130"
        stroke="#E6AA04" stroke-width="3"
        fill="none" rx="3" />

  <!-- Línea de eje sutil dentro del frame -->
  <line x1="40" y1="135" x2="160" y2="135"
        stroke="#000000" stroke-width="1" stroke-opacity="0.25" />

  <!-- Curva dentro del frame -->
  <path d="M 40 122 Q 70 70, 100 60 Q 130 70, 160 95"
        stroke="#000000" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Punto en el peak -->
  <circle cx="100" cy="60" r="7" fill="#E6AA04" />

  <!-- Microtext editorial al pie del frame · "VOL." -->
  <text x="22" y="180"
        font-family="Lato, 'Helvetica Neue', Arial, sans-serif"
        font-size="9"
        font-weight="700"
        fill="#000000"
        letter-spacing="2.5">FIG. 1 · IRF</text>
</svg>
