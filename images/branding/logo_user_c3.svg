<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <!-- VARIANTE C3 · Barras al pie + curva ondulada arriba (mitad-mitad)
       Mitad inferior · histograma de 4 barras crecientes.
       Mitad superior · curva ondulada flotante.
       Composición clásica de figura científica · simétrica vertical. -->
  <defs>
    <mask id="cutC3">
      <rect x="0" y="0" width="240" height="240" fill="white"/>

      <!-- 4 barras crecientes en la mitad inferior -->
      <rect x="50" y="170" width="22" height="20" fill="black" rx="2"/>
      <rect x="82" y="155" width="22" height="35" fill="black" rx="2"/>
      <rect x="114" y="135" width="22" height="55" fill="black" rx="2"/>
      <rect x="146" y="115" width="22" height="75" fill="black" rx="2"/>
      <rect x="178" y="100" width="22" height="90" fill="black" rx="2"/>

      <!-- Curva ondulada en la mitad superior -->
      <path d="M 45 75 C 70 60, 90 90, 110 80 C 135 70, 150 85, 195 50"
            fill="none" stroke="black" stroke-width="13"
            stroke-linecap="round" stroke-linejoin="round"/>
    </mask>
  </defs>
  <rect x="14" y="14" width="212" height="212" rx="32"
        fill="#D9A12C" mask="url(#cutC3)"/>
</svg>
