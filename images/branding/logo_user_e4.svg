<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <!-- E4 · Curva ascendente espejo (dos curvas suben al centro)
       2 curvas que ascienden desde los extremos hasta el peak central.
       Forma de "tejado" o "peak natural". Barras campana debajo. -->
  <defs>
    <mask id="cutE4">
      <rect x="0" y="0" width="240" height="240" fill="white"/>
      <!-- 5 barras campana abajo -->
      <rect x="51" y="170" width="22" height="20" fill="black" rx="2"/>
      <rect x="80" y="155" width="22" height="35" fill="black" rx="2"/>
      <rect x="109" y="140" width="22" height="50" fill="black" rx="2"/>
      <rect x="138" y="155" width="22" height="35" fill="black" rx="2"/>
      <rect x="167" y="170" width="22" height="20" fill="black" rx="2"/>
      <!-- Curva ascendente izquierda → centro -->
      <path d="M 45 125 Q 90 80, 120 65"
            stroke="black" stroke-width="13" fill="none"
            stroke-linecap="round"/>
      <!-- Curva ascendente derecha → centro -->
      <path d="M 195 125 Q 150 80, 120 65"
            stroke="black" stroke-width="13" fill="none"
            stroke-linecap="round"/>
      <!-- Punto en el peak central -->
      <circle cx="120" cy="65" r="11" fill="black"/>
    </mask>
  </defs>
  <rect x="14" y="14" width="212" height="212" rx="32" fill="#D9A12C" mask="url(#cutE4)"/>
</svg>
