<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- VARIANTE 4 · Doble línea · Treatment vs Control
       Eco directo de la metodología DiD: línea sólida (tratado, dorada)
       diverge de línea punteada (control, gris). Es tu paper en miniatura. -->

  <!-- Eje X -->
  <line x1="22" y1="170" x2="178" y2="170"
        stroke="#000000" stroke-width="2" stroke-linecap="round" />

  <!-- Tick marks -->
  <line x1="60" y1="170" x2="60" y2="174" stroke="#000000" stroke-width="1.5" />
  <line x1="100" y1="170" x2="100" y2="174" stroke="#000000" stroke-width="1.5" />
  <line x1="140" y1="170" x2="140" y2="174" stroke="#000000" stroke-width="1.5" />

  <!-- Línea control · gris punteada · estable horizontal -->
  <path d="M 25 130 Q 65 125, 100 128 Q 135 130, 175 132"
        stroke="#737373" stroke-width="3.5" stroke-dasharray="6,4"
        stroke-linecap="round" fill="none" />

  <!-- Línea treatment · dorada sólida · sube tras el shock -->
  <path d="M 25 130 Q 50 110, 80 80 Q 110 55, 140 50 Q 165 52, 175 60"
        stroke="#E6AA04" stroke-width="5.5"
        stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Punto de divergencia (t = shock) -->
  <circle cx="60" cy="120" r="6" fill="#000000" />

  <!-- Punto en peak treatment -->
  <circle cx="140" cy="50" r="9" fill="#E6AA04" />
</svg>
